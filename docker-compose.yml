version: "3.9"

# ============================================================
#  MailServer — Core Mail Stack
#  docker-compose.yml
# ============================================================

networks:
  mailnet:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"

volumes:
  redis_data:
  clamav_db:
  dkim_keys:
  mongodb_data:

services:

  # ── MongoDB (Replica Set member) ─────────────────────────
  mongodb:
    image: mongo:7
    container_name: mailserver-mongodb
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongodb/keyfile
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: mailserver
    volumes:
      - ${GLUSTER_MAIL_PATH:-/gluster/mail}/mongodb:/data/db
      - ./config/mongodb/keyfile:/etc/mongodb/keyfile:ro
      - ./config/mongodb/initdb.js:/docker-entrypoint-initdb.d/initdb.js:ro
    ports:
      - "27017:27017"
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Rspamd + Session cache) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: mailserver-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Postfix (SMTP) ────────────────────────────────────────
  postfix:
    build:
      context: ./docker/postfix
      dockerfile: Dockerfile
    image: mailserver-postfix:local
    container_name: mailserver-postfix
    restart: unless-stopped
    env_file: .env
    hostname: ${MAIL_HOSTNAME}
    volumes:
      - ${GLUSTER_MAIL_PATH:-/gluster/mail}/vhosts:/var/mail/vhosts
      - ${GLUSTER_CERTS_PATH:-/gluster/certs}:/etc/ssl/mailserver:ro
      - dkim_keys:/etc/opendkim/keys
      - ./config/postfix/main.cf:/etc/postfix/main.cf:ro
      - ./config/postfix/master.cf:/etc/postfix/master.cf:ro
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    depends_on:
      mongodb:
        condition: service_healthy
      dovecot:
        condition: service_started
    networks:
      - mailnet

  # ── Dovecot (IMAP / POP3 / LMTP / SASL) ─────────────────
  dovecot:
    build:
      context: ./docker/dovecot
      dockerfile: Dockerfile
    image: mailserver-dovecot:local
    container_name: mailserver-dovecot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${GLUSTER_MAIL_PATH:-/gluster/mail}/vhosts:/var/mail/vhosts
      - ${GLUSTER_CERTS_PATH:-/gluster/certs}:/etc/ssl/mailserver:ro
      - ./config/dovecot/dovecot.conf:/etc/dovecot/dovecot.conf:ro
      - ./config/dovecot/conf.d:/etc/dovecot/conf.d:ro
    ports:
      - "143:143"
      - "993:993"
      - "4190:4190"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mailnet

  # ── Rspamd (Spam filter + DKIM) ───────────────────────────
  rspamd:
    image: rspamd/rspamd:latest
    container_name: mailserver-rspamd
    restart: unless-stopped
    volumes:
      - ./config/rspamd/local.d:/etc/rspamd/local.d:ro
      - ./config/rspamd/override.d:/etc/rspamd/override.d:ro
      - dkim_keys:/var/lib/rspamd/dkim:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mailnet

  # ── ClamAV (Antivirus) ────────────────────────────────────
  clamav:
    image: clamav/clamav:latest
    container_name: mailserver-clamav
    restart: unless-stopped
    volumes:
      - clamav_db:/var/lib/clamav
      - ./config/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
      - ./config/clamav/freshclam.conf:/etc/clamav/freshclam.conf:ro
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
