version: "3.9"

# ============================================================
#  MailServer — Core Mail Stack
#  docker-compose.yml  (Windows / single-server edition)
#
#  HA components removed: GlusterFS, Keepalived, MongoDB
#  replica-set flags, keyfile auth, and HAProxy are all gone.
#  Data lives in named Docker volumes — no host-path coupling.
# ============================================================

networks:
  mailnet:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  mail_data:
  cert_data:
  dkim_keys:
  clamav_db:

services:

  # ── MongoDB (standalone) ──────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mailserver-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: mailserver
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      - ./config/mongodb/initdb.js:/docker-entrypoint-initdb.d/initdb.js:ro
    ports:
      - "27017:27017"
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Rspamd + session cache) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: mailserver-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Postfix (SMTP) ────────────────────────────────────────
  postfix:
    build:
      context: ./docker/postfix
      dockerfile: Dockerfile
    image: mailserver-postfix:local
    container_name: mailserver-postfix
    restart: unless-stopped
    env_file: .env
    hostname: ${MAIL_HOSTNAME}
    volumes:
      - mail_data:/var/mail/vhosts
      - cert_data:/etc/ssl/mailserver:ro
      - dkim_keys:/etc/opendkim/keys
      - ./config/postfix/main.cf:/etc/postfix/main.cf
      - ./config/postfix/master.cf:/etc/postfix/master.cf:ro
      - ./config/postfix/virtual_mailbox_pcre:/etc/postfix/virtual_mailbox_pcre:ro
      - ./config/postfix/sender_login_pcre:/etc/postfix/sender_login_pcre:ro
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    environment:
      API_URL: "http://api:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      dovecot:
        condition: service_started
    networks:
      - mailnet

  # ── Dovecot (IMAP / POP3 / LMTP / SASL) ─────────────────
  dovecot:
    build:
      context: ./docker/dovecot
      dockerfile: Dockerfile
    image: mailserver-dovecot:local
    container_name: mailserver-dovecot
    restart: unless-stopped
    env_file: .env
    volumes:
      - mail_data:/var/mail/vhosts
      - cert_data:/etc/ssl/mailserver:ro
      - ./config/dovecot/dovecot.conf:/etc/dovecot/dovecot.conf:ro
      - ./config/dovecot/conf.d:/etc/dovecot/conf.d:ro
    ports:
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
      - "4190:4190"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mailnet

  # ── Rspamd (spam filter + DKIM signing) ───────────────────
  rspamd:
    image: rspamd/rspamd:latest
    container_name: mailserver-rspamd
    restart: unless-stopped
    volumes:
      - ./config/rspamd/local.d:/etc/rspamd/local.d:ro
      - ./config/rspamd/override.d:/etc/rspamd/override.d:ro
      - dkim_keys:/var/lib/rspamd/dkim:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mailnet

  # ── ClamAV (antivirus) ────────────────────────────────────
  clamav:
    image: clamav/clamav:latest
    container_name: mailserver-clamav
    restart: unless-stopped
    volumes:
      - clamav_db:/var/lib/clamav
      - ./config/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
      - ./config/clamav/freshclam.conf:/etc/clamav/freshclam.conf:ro
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
