version: "3.9"

# ============================================================
#  MailServer — Application Layer
#  docker-compose.apps.yml  (Windows / single-server edition)
#
#  Removed: HAProxy (Nginx handles everything)
#           GlusterFS volume mounts → named Docker volumes
#  Added:   cloudflared Tunnel service for public access
#           cert_data named volume shared with core stack
# ============================================================

networks:
  mailnet:
    external: true

volumes:
  cert_data:
    external: true          # shared with docker-compose.yml
  nextcloud_data:
  nextcloud_html:

services:

  # ── Node.js REST API ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mailserver-api:local
    container_name: mailserver-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3000}
      MONGO_URI: ${MONGO_URI}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASSWORD}
      IMAP_HOST: dovecot
      IMAP_PORT: 993
      SMTP_HOST: postfix
      SMTP_PORT: 587
      NEXTCLOUD_URL: http://nextcloud
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
    depends_on:
      - mongodb
      - redis
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React Webmail Frontend ────────────────────────────────
  webmail:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_NC_URL: /nextcloud
    image: mailserver-webmail:local
    container_name: mailserver-webmail
    restart: unless-stopped
    networks:
      - mailnet

  # ── Nextcloud (Files / Calendar / Contacts / Office) ──────
  nextcloud:
    image: nextcloud:27-fpm-alpine
    container_name: mailserver-nextcloud
    restart: unless-stopped
    environment:
      SQLITE_DATABASE: nextcloud
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS:-mail.yourdomain.com localhost}
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - nextcloud_data:/var/www/html/data
      - nextcloud_html:/var/www/html
      - ./config/nextcloud/nextcloud.config.php:/var/www/html/config/custom.config.php:ro
    depends_on:
      - redis
    networks:
      - mailnet

  # ── Collabora Online (LibreOffice in browser) ─────────────
  collabora:
    image: collabora/code:latest
    container_name: mailserver-collabora
    restart: unless-stopped
    cap_add:
      - MKNOD
    environment:
      domain: ${MAIL_HOSTNAME}
      extra_params: --o:ssl.enable=false --o:ssl.termination=true
      DONT_GEN_SSL_CERT: "YES"
    networks:
      - mailnet
    deploy:
      resources:
        limits:
          memory: 2g

  # ── Nginx (reverse proxy — HTTP + HTTPS) ──────────────────
  nginx:
    image: nginx:alpine
    container_name: mailserver-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - cert_data:/etc/ssl/mailserver:ro
      - nextcloud_html:/var/www/nextcloud:ro
    depends_on:
      - api
      - webmail
      - nextcloud
      - collabora
    networks:
      - mailnet

  # ── Cloudflare Tunnel (public access, no port forwarding) ─
  #
  #  Two ways to authenticate:
  #   Option A (recommended) — tunnel token (easiest):
  #     Set CLOUDFLARE_TUNNEL_TOKEN in .env, leave the volumes
  #     section and config below commented out.
  #   Option B — credentials JSON (more control):
  #     Run setup-cloudflare.ps1, then uncomment the volumes
  #     block and point config.yml at your tunnel ID.
  #
  #  Disable this service entirely if you prefer direct port
  #  forwarding from your router.
  # ─────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mailserver-cloudflared
    restart: unless-stopped
    # Option A — token-based (set CLOUDFLARE_TUNNEL_TOKEN in .env)
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    # Option B — credentials file (uncomment + comment out command above)
    # command: tunnel --no-autoupdate run
    # volumes:
    #   - ./config/cloudflared:/etc/cloudflared:ro
    networks:
      - mailnet
    depends_on:
      - nginx

  # ── Certbot (SSL renewal — only needed without Cloudflare) ─
  #
  #  If you use Cloudflare Tunnel you can use a Cloudflare
  #  Origin Certificate instead of Let's Encrypt. Comment this
  #  service out if you are using the tunnel.
  # ─────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: mailserver-certbot
    volumes:
      - cert_data:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - mailnet
