version: "3.9"

# ============================================================
#  MailServer — Application Layer
#  docker-compose.apps.yml
# ============================================================

networks:
  mailnet:
    external: true

services:

  # ── Node.js REST API ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mailserver-api:local
    container_name: mailserver-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3000}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASSWORD}
      IMAP_HOST: dovecot
      IMAP_PORT: 993
      SMTP_HOST: postfix
      SMTP_PORT: 587
      NEXTCLOUD_URL: http://nextcloud
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
    depends_on:
      - mariadb
      - redis
      - dovecot
      - postfix
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React Webmail Frontend (served by Nginx) ───────────────
  webmail:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_NC_URL: /nextcloud
    image: mailserver-webmail:local
    container_name: mailserver-webmail
    restart: unless-stopped
    networks:
      - mailnet

  # ── Nextcloud (Files / Calendar / Contacts / Office) ──────
  nextcloud:
    image: nextcloud:27-fpm-alpine
    container_name: mailserver-nextcloud
    restart: unless-stopped
    environment:
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: ${NEXTCLOUD_DB_USER}
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${GLUSTER_NEXTCLOUD_PATH:-/gluster/nextcloud}/data:/var/www/html/data
      - ${GLUSTER_NEXTCLOUD_PATH:-/gluster/nextcloud}/html:/var/www/html
      - ./config/nextcloud/nextcloud.config.php:/var/www/html/config/custom.config.php:ro
    depends_on:
      - mariadb
      - redis
    networks:
      - mailnet

  # ── Collabora Online (CODE — LibreOffice in browser) ──────
  collabora:
    image: collabora/code:latest
    container_name: mailserver-collabora
    restart: unless-stopped
    cap_add:
      - MKNOD
    environment:
      domain: ${MAIL_HOSTNAME}
      extra_params: --o:ssl.enable=false --o:ssl.termination=true
      DONT_GEN_SSL_CERT: "YES"
    networks:
      - mailnet
    deploy:
      resources:
        limits:
          memory: 2g

  # ── Nginx (Reverse Proxy for all web services) ─────────────
  nginx:
    image: nginx:alpine
    container_name: mailserver-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${GLUSTER_CERTS_PATH:-/gluster/certs}:/etc/ssl/mailserver:ro
      - ${GLUSTER_NEXTCLOUD_PATH:-/gluster/nextcloud}/html:/var/www/nextcloud:ro
    depends_on:
      - api
      - webmail
      - nextcloud
      - collabora
    networks:
      - mailnet

  # ── HAProxy (TCP proxy for mail ports) ────────────────────
  haproxy:
    image: haproxy:2.8-alpine
    container_name: mailserver-haproxy
    restart: unless-stopped
    ports:
      - "8404:8404"  # Stats page
    volumes:
      - ./config/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - mailnet

  # ── Certbot (SSL Certificate renewal) ─────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: mailserver-certbot
    volumes:
      - ${GLUSTER_CERTS_PATH:-/gluster/certs}:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - mailnet
