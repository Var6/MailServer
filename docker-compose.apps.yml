version: "3.9"

# ============================================================
#  MailServer — Application Layer
#  Files: D:\maildata\files\ via the Node.js API.
#  Office editing: Collabora Online (collabora/code)
# ============================================================

networks:
  mailnet:

services:

  # ── Node.js REST API ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mailserver-api:local
    container_name: mailserver-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3000}
      MONGO_URI: ${MONGO_URI}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASSWORD}
      IMAP_HOST: dovecot
      IMAP_PORT: 993
      SMTP_HOST: postfix
      SMTP_PORT: 587
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
      MAIL_DOMAIN: ${MAIL_DOMAIN}
      FILE_STORAGE_DRIVER: local
      LOCAL_FILES_ROOT: /data/files
      LOCAL_FILES_HOST_PATH: D:/maildata/files
    volumes:
      - D:/maildata/files:/data/files
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - mongodb
      - redis
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React Webmail Frontend ────────────────────────────────
  webmail:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    image: mailserver-webmail:local
    container_name: mailserver-webmail
    restart: unless-stopped
    networks:
      - mailnet

  # ── Nginx (reverse proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mailserver-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8082:8082"
      - "8443:8443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - cert_data:/etc/ssl/mailserver:ro
    depends_on:
      - api
      - webmail
    networks:
      - mailnet

  # ── Collabora Online (office editor) ─────────────────────
  collabora:
    image: collabora/code:latest
    container_name: mailserver-collabora
    restart: unless-stopped
    environment:
      # WOPI host that Collabora is allowed to contact (our API on internal network)
      aliasgroup1: "http://api:3000"
      # Disable built-in SSL — nginx terminates TLS
      DONT_GEN_SSL_CERT: "YES"
      extra_params: "--o:ssl.enable=false --o:ssl.termination=true --o:logging.level=warning"
    networks:
      - mailnet

  # ── Cloudflare Tunnel (public HTTPS, no port forwarding) ──
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mailserver-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - mailnet
    depends_on:
      - nginx

  # ── Certbot (SSL renewal — only if not using Cloudflare) ──
  certbot:
    profiles: ["ssl"]
    image: certbot/certbot:latest
    container_name: mailserver-certbot
    volumes:
      - cert_data:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - mailnet
