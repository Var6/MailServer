version: "3.9"
# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.dev.yml — Local dev without Pi / SSL / mail stack
#
# Starts only MongoDB + the Node API + the Vite dev server.
# No Postfix, Dovecot, Rspamd, ClamAV, Nextcloud, or Keepalived.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   cd frontend && npm install && npm run dev
# ──────────────────────────────────────────────────────────────────────────────

services:
  mongodb:
    image: mongo:7
    container_name: mailserver-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: mailserver
    volumes:
      - mongodb_dev_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mailserver-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://root:devpassword@mongodb:27017/mailserver?authSource=admin
      JWT_SECRET: dev-jwt-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: dev-refresh-secret-at-least-32-chars
      CORS_ORIGIN: "http://localhost:5173"
      MAIL_DOMAIN: localhost
      IMAP_HOST: ""
      SMTP_HOST: ""
      NEXTCLOUD_URL: ""
      INTERNAL_AUTH_TOKEN: dev-internal-token-12345

volumes:
  mongodb_dev_data:
