mail_location = maildir:/var/mail/vhosts/%d/%n

namespace inbox {
  inbox = yes
}

# On Windows NTFS bind-mounts only uid 0 can write — run mail I/O as root
mail_uid = root
mail_gid = root
first_valid_uid = 0
first_valid_gid = 0
mail_privileged_group = mail

# Quota
mail_plugins = $mail_plugins quota
