auth_mechanisms = plain login
disable_plaintext_auth = no

# Auth via checkpassword → Node API → MongoDB
passdb {
  driver = checkpassword
  args   = /usr/local/bin/dovecot-checkpassword
}

userdb {
  driver = prefetch
  # User info is set by checkpassword via EXTRA env variables
}

# Fallback userdb if prefetch fails
userdb {
  driver = static
  args   = uid=5000 gid=5000 home=/var/mail/vhosts/%d/%n
}
