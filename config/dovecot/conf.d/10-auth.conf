auth_mechanisms = plain login
disable_plaintext_auth = no

# checkpassword: handles real IMAP/SMTP auth (verifies password via API).
# For LMTP user-existence lookups (auth-master USER request), the checkpassword
# DRIVER itself returns internal-failure (exit 111) — NOT our script.
# result_internalfail=continue lets the next passdb handle those lookups.
passdb {
  driver = checkpassword
  args   = /usr/local/bin/dovecot-checkpassword
  result_internalfail = continue
}

# Static fallback: only reached when checkpassword returns internal-failure
# (i.e. LMTP auth-master lookup mode). nopassword=y makes it accept any user.
# Never reached for real auth failures (wrong password exits 1 → return-fail).
passdb {
  driver = static
  args   = nopassword=y
}

userdb {
  driver = static
  args   = uid=vmail gid=vmail home=/var/mail/vhosts/%d/%n
}
