global
  log stdout format raw local0
  maxconn 50000
  user haproxy
  group haproxy
  stats socket /var/run/haproxy/admin.sock mode 660 level admin

defaults
  log global
  mode tcp
  option tcplog
  option dontlognull
  timeout connect 5s
  timeout client  50s
  timeout server  50s
  retries 3

# ── Stats page ────────────────────────────────────────────
frontend stats
  bind *:8404
  mode http
  stats enable
  stats uri /stats
  stats refresh 10s
  stats auth admin:HAPROXY_STATS_PASS_PLACEHOLDER

# ── SMTP (port 25) ────────────────────────────────────────
frontend smtp_in
  bind *:25
  default_backend smtp_servers

backend smtp_servers
  option tcp-check
  server pi1 PI_PRIMARY_IP:25   check inter 5s
  server pi2 PI_SECONDARY_IP:25 check inter 5s backup

# ── Submission (port 587) ────────────────────────────────
frontend submission_in
  bind *:587
  default_backend submission_servers

backend submission_servers
  server pi1 PI_PRIMARY_IP:587   check inter 5s
  server pi2 PI_SECONDARY_IP:587 check inter 5s backup

# ── IMAPS (port 993) ─────────────────────────────────────
frontend imaps_in
  bind *:993
  default_backend imap_servers

backend imap_servers
  server pi1 PI_PRIMARY_IP:993   check inter 5s
  server pi2 PI_SECONDARY_IP:993 check inter 5s backup

# ── HTTPS (port 443) — fallback if not handled by Keepalived VIP directly
frontend https_in
  bind *:443
  default_backend https_servers

backend https_servers
  server pi1 PI_PRIMARY_IP:443   check inter 5s
  server pi2 PI_SECONDARY_IP:443 check inter 5s backup
