# ============================================================
#  Nginx — Catch-all reverse proxy
#  Serves ANY domain pointing to this server.
#  Tenants point mail.theirdomain.com → your public IP.
#  No config change needed when adding new tenants.
# ============================================================

# ── HTTP: allow /api/setup over plain HTTP, redirect everything else ─────────
server {
  listen 80 default_server;
  server_name _;

  # One-time setup endpoint (creates first superadmin, safe to leave open)
  location = /api/setup {
    proxy_pass         http://api:3000/setup;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto http;
    proxy_http_version 1.1;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS: serves every domain ───────────────────────────────────────────────
server {
  listen 443 ssl default_server;
  server_name _;

  ssl_certificate     /etc/ssl/mailserver/fullchain.pem;
  ssl_certificate_key /etc/ssl/mailserver/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_stapling        off;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;

  client_max_body_size 1G;

  # ── Collabora / LibreOffice Online ─────────────────────────────────────────
  # Browser connects here via WebSocket for live document editing
  location ~ ^/cool/(.*)/ws$ {
    proxy_pass         http://collabora:9980;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "Upgrade";
    proxy_set_header   Host $http_host;
    proxy_read_timeout 36000s;
  }

  location ^~ /browser {
    proxy_pass       http://collabora:9980;
    proxy_set_header Host $http_host;
  }

  location ^~ /hosting {
    proxy_pass       http://collabora:9980;
    proxy_set_header Host $http_host;
  }

  location ~ ^/(c|l)ool {
    proxy_pass       http://collabora:9980;
    proxy_set_header Host $http_host;
  }

  # ── Node.js REST API ────────────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://api:3000/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # ── React Webmail SPA (catch-all) ───────────────────────────────────────────
  location / {
    proxy_pass         http://webmail:80;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 60s;
  }
}
