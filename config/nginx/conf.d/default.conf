# ============================================================
#  Nginx — Reverse proxy (local-storage edition)
#  Nextcloud and Collabora removed — files served by API.
# ============================================================

# ── HTTP: redirect to HTTPS (except setup endpoint) ─────────
server {
  listen 8080 default_server;
  server_name _;

  location = /api/setup {
    proxy_pass         http://api:3000/setup;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto http;
    proxy_http_version 1.1;
  }

  location / {
    return 301 https://$host:8443$request_uri;
  }
}

# ── Plain HTTP (Tailscale Funnel / internal) ─────────────────
server {
  listen 8082 default_server;
  server_name _;

  # Collabora WebSocket paths contain http:// — don't collapse double slashes
  merge_slashes off;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  client_max_body_size 10G;

  location /api/ {
    proxy_pass         http://api:3000/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # Collabora: pass raw URI (no URI in proxy_pass) to preserve percent-encoding
  location /cool/ {
    proxy_pass         http://collabora:9980;
    proxy_set_header   Host $host;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
  location /browser/ {
    proxy_pass         http://collabora:9980;
    proxy_set_header   Host $host;
    proxy_http_version 1.1;
  }
  location /hosting/ {
    proxy_pass         http://collabora:9980;
    proxy_set_header   Host $host;
    proxy_http_version 1.1;
  }

  location / {
    proxy_pass         http://webmail:80;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    proxy_http_version 1.1;
  }
}

# ── HTTPS ────────────────────────────────────────────────────
server {
  listen 8443 ssl default_server;
  server_name _;

  ssl_certificate     /etc/ssl/mailserver/fullchain.pem;
  ssl_certificate_key /etc/ssl/mailserver/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_stapling        off;

  # Collabora WebSocket paths contain http:// — don't collapse double slashes
  merge_slashes off;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  client_max_body_size 10G;

  # ── Node.js REST API ───────────────────────────────────────
  location /api/ {
    proxy_pass         http://api:3000/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # ── Collabora Online ───────────────────────────────────────
  # No URI in proxy_pass → raw percent-encoded path forwarded unchanged
  location /cool/ {
    proxy_pass         http://collabora:9980;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    # WebSocket support (required by Collabora)
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
  }
  location /browser/ {
    proxy_pass         http://collabora:9980;
    proxy_set_header   Host $host;
    proxy_http_version 1.1;
  }
  location /hosting/ {
    proxy_pass         http://collabora:9980;
    proxy_set_header   Host $host;
    proxy_http_version 1.1;
  }

  # ── React Webmail SPA (catch-all) ──────────────────────────
  location / {
    proxy_pass         http://webmail:80;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 60s;
  }
}
