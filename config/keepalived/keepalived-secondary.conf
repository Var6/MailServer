# ============================================================
#  Keepalived — Pi-2 (BACKUP)
#  Install to: /etc/keepalived/keepalived.conf on Pi-2
# ============================================================

global_defs {
  router_id MAILSERVER_PI2
  enable_script_security
}

vrrp_script chk_nginx {
  script "/usr/bin/pgrep nginx"
  interval 2
  weight  -10
}

vrrp_instance VI_MAIL {
  state BACKUP
  interface eth0
  virtual_router_id 51
  priority 100           # Primary gets 200 — it wins unless it fails

  advert_int 1

  authentication {
    auth_type PASS
    auth_pass KEEPALIVED_SECRET_PLACEHOLDER
  }

  virtual_ipaddress {
    192.168.1.100/24 dev eth0
  }

  track_script {
    chk_nginx
  }

  notify_master  "/etc/keepalived/notify.sh MASTER"
  notify_backup  "/etc/keepalived/notify.sh BACKUP"
  notify_fault   "/etc/keepalived/notify.sh FAULT"
}
