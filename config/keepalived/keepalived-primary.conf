# ============================================================
#  Keepalived — Pi-1 (MASTER)
#  Install to: /etc/keepalived/keepalived.conf on Pi-1
# ============================================================

global_defs {
  router_id MAILSERVER_PI1
  enable_script_security
}

# Check that nginx is running
vrrp_script chk_nginx {
  script "/usr/bin/pgrep nginx"
  interval 2
  weight  -10
}

vrrp_instance VI_MAIL {
  state MASTER
  interface eth0
  virtual_router_id 51
  priority 200           # Secondary gets 100

  advert_int 1

  authentication {
    auth_type PASS
    auth_pass KEEPALIVED_SECRET_PLACEHOLDER
  }

  virtual_ipaddress {
    192.168.1.100/24 dev eth0    # The VIP — point your DNS A records here
  }

  track_script {
    chk_nginx
  }

  notify_master  "/etc/keepalived/notify.sh MASTER"
  notify_backup  "/etc/keepalived/notify.sh BACKUP"
  notify_fault   "/etc/keepalived/notify.sh FAULT"
}
