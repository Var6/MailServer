# ============================================================
#  Cloudflare Tunnel — config.yml
#
#  Used only with Option B (credentials-file auth).
#  If you are using a tunnel token (Option A, the default),
#  this file is not needed — cloudflared reads the token from
#  the CLOUDFLARE_TUNNEL_TOKEN env var.
#
#  To use this file:
#    1. Run scripts\setup-cloudflare.ps1
#    2. Replace <TUNNEL_ID> with your actual tunnel UUID
#    3. Place creds.json (generated by cloudflared) at
#       config/cloudflared/creds.json
#    4. Uncomment the volumes + command in docker-compose.apps.yml
# ============================================================

tunnel: <TUNNEL_ID>
credentials-file: /etc/cloudflared/creds.json

ingress:
  # Webmail + API (HTTPS)
  - hostname: mail.yourdomain.com
    service: https://nginx:443
    originRequest:
      noTLSVerify: true          # Nginx uses a self-signed / Origin cert

  # Nextcloud (same host, different path — handled by Nginx)
  - hostname: cloud.yourdomain.com
    service: https://nginx:443
    originRequest:
      noTLSVerify: true

  # Catch-all (required by cloudflared)
  - service: http_status:404
